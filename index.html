//=============================================================================
// Helpers  (ported from src/lib/{format,eta,status,data}.ts)
//=============================================================================
const NOW = Date.now();
const ms = (min) => (min==null ? null : NOW - min*60000);
function formatRelativeTime(t){ if(t==null) return "—"; const d=Math.round((Date.now()-t)/60000);
  if(d<1) return "Just now"; if(d===1) return "1 min ago"; if(d<60) return d+" min ago";
  const h=Math.round(d/60); if(h===1) return "1 hour ago"; if(h<24) return h+" hours ago";
  const dd=Math.round(h/24); return dd===1?"1 day ago":dd+" days ago"; }
function formatClockTime(t){ if(t==null) return "—"; return new Date(t).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}); }
function clockTimeAfter(t,min){ if(t==null) return "—"; return formatClockTime(t+min*60000); }
function formatDuration(min){ if(min<=0) return "0 min"; if(min<60) return min+" min"; const h=Math.floor(min/60),m=min%60; return m===0?h+" hr":h+" hr "+m+" min"; }
function finalStop(stops){ return stops.reduce((a,b)=>a.order>b.order?a:b); }
function nextStop(stops,cur){ return stops.filter(s=>s.order>cur).sort((a,b)=>a.order-b.order)[0]||null; }
function calcETA(stops,cur,target,delay){ delay=delay||0; if(target<=cur) return 0;
  return stops.filter(s=>s.order>cur && s.order<=target).reduce((s,x)=>s+x.avg,0) + Math.max(0,delay); }
function progressPct(stops,cur){ if(stops.length<=1||cur<=0) return 0; const last=finalStop(stops).order; return Math.round(Math.min(cur,last)/last*100); }
function timelineState(order,cur){ if(cur<=0) return order===1?"next":"upcoming"; if(order<cur) return "completed"; if(order===cur) return "current"; if(order===cur+1) return "next"; return "upcoming"; }
function busFor(routeId){ return BUSES.find(b=>b.routeId===routeId)||null; }
function noticesForRoute(routeId){ return NOTICES.filter(n=>n.routeId===routeId||n.routeId==="all"); }
function routeLabel(routeId){ if(routeId==="all") return "All routes"; const r=ROUTES.find(x=>x.id===routeId); return r?r.startPoint+" → "+r.endPoint:"Route"; }

  const c = STATUS[status] || STATUS.offline;
  const dot = '<span class="relative flex h-2 w-2">'
    + (pulse ? '<span class="absolute inline-flex h-full w-full rounded-full opacity-75 animate-pulse-ring '+c.dot+'"></span>' : '')
    + '<span class="relative inline-flex h-2 w-2 rounded-full '+c.dot+'"></span></span>';
  return '<span class="inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-small font-semibold '+c.badge+'">'+dot+c.label+'</span>';
}

function infoRow(icon,label,value,opts){
  opts = opts||{};
  const vc = opts.tone==="warning" ? "text-warning-700" : opts.strong ? "text-ink-900" : "text-ink-700";

function miniStepper(stops,cur,status,c){
  let html='<div class="flex items-center">';
  stops.forEach((s,i)=>{
    const reached = cur>0 && s.order<cur;
    const isCur = cur>0 && s.order===cur;
    const isNext = status!=="cancelled" && timelineState(s.order,cur)==="next";
    let dot;
    if(isCur){
      dot='<span class="relative flex h-6 w-6 items-center justify-center rounded-full text-white shadow-sm" style="background:'+c.hex+'"><span class="absolute inline-flex h-full w-full rounded-full opacity-60 animate-pulse-ring" style="background:'+c.hex+'"></span><span class="relative">'+ic('bus','h-3.5 w-3.5')+'</span></span>';
    } else if(reached){
      dot='<span class="h-3.5 w-3.5 rounded-full ring-2 ring-white" style="background:'+c.hex+'"></span>';
    } else if(isNext){
      dot='<span class="h-3.5 w-3.5 rounded-full bg-warning-500 ring-2 ring-warning-100"></span>';
    } else {
      dot='<span class="h-3.5 w-3.5 rounded-full border-2 border-slate-400 bg-white"></span>';
    }
    html+=dot;
    if(i<stops.length-1){
      const filled = cur>0 && s.order<cur;
      html+='<span class="mx-0.5 h-1 flex-1 rounded-full" style="background:'+(filled?c.hex:'#aeb9c8')+'"></span>';
    }
  });
  return html+'</div>';
}

// Contextual notice indicator shown next to the status badge.
function noticeBell(routeId, interactive){
  const ns = noticesForRoute(routeId);
  if(!ns.length) return "";
  const urgent = ns.some(n=>n.priority==="emergency"||n.priority==="cancelled");
  const tone = urgent ? "bg-danger-50 text-danger-700 ring-1 ring-danger-100" : "bg-warning-50 text-warning-700 ring-1 ring-warning-100";
  const badgeBg = urgent ? "bg-danger-600" : "bg-warning-500";
  const attr = interactive ? ' data-action="toggle-notices" role="button"' : ' aria-hidden="true"';
  return '<span'+attr+' class="relative inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-xl '+tone+(interactive?' cursor-pointer active:scale-95 transition':'')+'">'+ic('bell','h-4 w-4')
    + '<span class="absolute -right-1 -top-1 flex h-4 min-w-4 items-center justify-center rounded-full '+badgeBg+' px-1 text-[10px] font-bold text-white ring-2 ring-surface">'+ns.length+'</span></span>';

function routeCard(route){
  const bus = busFor(route.id);
  const status = bus ? bus.currentStatus : "offline";

  const stops = [...route.stops].sort((a,b)=>a.order-b.order);
  const fs = stops[stops.length-1];
  const cur = bus ? bus.lastCheckpointOrder : 0;
  const delay = bus ? bus.delayMinutes : 0;
  const ns = nextStop(stops,cur);
  const moving = status==="active"||status==="delayed";
  const etaNext = (ns&&moving) ? calcETA(stops,cur,ns.order,delay) : null;
  const etaDest = moving ? calcETA(stops,cur,fs.order,delay) : null;
  const busName = bus ? bus.name : "Bus";
  const cta = moving ? "Track this bus" : "View details";

  // ---- highlighted band: where it is now / what's next ----
  let band;

      + '<div class="min-w-0"><p class="text-[10px] font-bold uppercase tracking-wide text-ink-900">Now at</p><p class="truncate text-body font-bold text-ink-900">'+(bus.lastCheckpointName||"—")+'</p></div>'

      + '</div>';
  } else if(status==="not_started"){
    band = '<div class="mt-3 flex items-center gap-2.5 rounded-xl bg-surface-muted/70 px-3 py-2.5"><span class="text-ink-700">'+ic('calendarClock','h-4 w-4')+'</span><p class="text-body text-ink-900">Departs <span class="font-bold text-ink-900">'+(route.scheduledStart||"—")+'</span> from '+route.startPoint+'</p></div>';
  } else if(status==="cancelled"){
    band = '<div class="mt-3 flex items-start gap-2.5 rounded-xl bg-danger-50 px-3 py-2.5"><span class="mt-0.5 text-danger-600">'+ic('circleSlash','h-4 w-4')+'</span><div><p class="text-body font-semibold text-ink-900">Cancelled today</p>'+(bus.issueMessage?'<p class="text-small text-ink-900">'+bus.issueMessage+'</p>':'')+'</div></div>';

function filterRoutes(query, statusList){
  const q = query.trim().toLowerCase();
  return ROUTES.filter(r=>{
    const bus = busFor(r.id);
    if(statusList && statusList.length){ const st = bus?bus.currentStatus:"offline"; if(!statusList.includes(st)) return false; }
    if(!q) return true;
    const hay = [r.name,r.startPoint,r.endPoint, bus?bus.name:"", ...r.stops.map(s=>s.name)].join(" ").toLowerCase();
    return hay.includes(q);
  });
}

//-- Faux schematic map: route as a winding road with checkpoint nodes --------
function smoothPath(p){
  if(p.length<2) return p.length ? ("M "+p[0].x.toFixed(1)+" "+p[0].y.toFixed(1)) : "";
  let d = "M "+p[0].x.toFixed(1)+" "+p[0].y.toFixed(1);
  for(let i=0;i<p.length-1;i++){
    const p0=p[i-1]||p[i], p1=p[i], p2=p[i+1], p3=p[i+2]||p2;
    const c1x=p1.x+(p2.x-p0.x)/6, c1y=p1.y+(p2.y-p0.y)/6;
    const c2x=p2.x-(p3.x-p1.x)/6, c2y=p2.y-(p3.y-p1.y)/6;
    d += " C "+c1x.toFixed(1)+" "+c1y.toFixed(1)+" "+c2x.toFixed(1)+" "+c2y.toFixed(1)+" "+p2.x.toFixed(1)+" "+p2.y.toFixed(1);
  }
  return d;
}
function fauxMap(route,bus){
  const stops=[...route.stops].sort((a,b)=>a.order-b.order);

  const status=bus?bus.currentStatus:"offline";

  // City decoration (purely cosmetic, drawn behind the road)

          +'<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="6" fill="#f59e0b" stroke="#fff" stroke-width="2.5"/>';
      } else {
        nodes+='<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="6" fill="#fff" stroke="#9aa7b8" stroke-width="2.5"/>';

  if(cur>0){

      +'</g>';
  }

  const svg='<svg viewBox="0 0 '+W+' '+H+'" class="block w-full" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Schematic route map">'

    +'</div>';

    +   (destEta!=null ? '<div class="shrink-0 text-right"><p class="text-small text-ink-500">ETA to '+fs.name+'</p><p class="text-card-title font-bold '+(status==="delayed"?"text-warning-700":"text-ink-900")+'">'+formatDuration(destEta)+'</p></div>' : '')

function progressBar(route,bus){
  const stops=[...route.stops].sort((a,b)=>a.order-b.order);
  const cur=bus?bus.lastCheckpointOrder:0, status=bus?bus.currentStatus:"offline";
  const c=STATUS[status]||STATUS.offline; const pct=progressPct(stops,cur);
  const ticks = stops.map(s=>{
    const reached = cur>=s.order && cur>0; const isCur = cur===s.order;
    const cls = isCur ? c.dot+' ring-2 ring-white scale-110' : reached ? c.fill : 'bg-slate-300';
    return '<span class="h-3 w-3 rounded-full border-2 border-white '+cls+'"></span>';
  }).join("");
  return '<div><div class="mb-2 flex items-center justify-between text-small"><span class="font-semibold text-ink-700">'+stops[0].name+'</span><span class="font-semibold text-ink-700">'+stops[stops.length-1].name+'</span></div>'
    + '<div class="relative h-2 rounded-full bg-slate-200"><div class="absolute inset-y-0 left-0 rounded-full '+c.fill+'" style="width:'+pct+'%"></div>'
    + '<div class="absolute inset-0 flex items-center justify-between px-0.5">'+ticks+'</div></div>'
    + '<p class="mt-2 text-small text-ink-500">Progress: <span class="font-semibold text-ink-700">'+pct+'%</span></p></div>';
}

function buildTimeline(route,bus){
  const stops=[...route.stops].sort((a,b)=>a.order-b.order);
  const cur=bus?bus.lastCheckpointOrder:0, delay=bus?bus.delayMinutes:0;
  const lastUpd = bus?ms(bus.lastUpdatedMin):null;
  const hasProgress = cur>0 && (bus&&bus.currentStatus!=="cancelled");
  const reached = REACHED[route.id]||{};
  return stops.map(s=>{
    const st = timelineState(s.order,cur);
    if((st==="completed"||st==="current") && hasProgress){
      const t = reached[s.order]!=null ? ms(reached[s.order]) : null;
      return { stop:s, state:st, timeLabel: t!=null?formatClockTime(t):null };
    }
    if(hasProgress && lastUpd!=null){
      const eta = calcETA(stops,cur,s.order,delay);
      return { stop:s, state:st, timeLabel: clockTimeAfter(lastUpd,eta) };
    }
    return { stop:s, state:st, timeLabel:null };
  });
}

function timelineNode(st){
  if(st==="completed") return '<span class="flex h-5 w-5 items-center justify-center rounded-full bg-success-500 text-white">'+ic('check','h-3 w-3')+'</span>';
  if(st==="current") return '<span class="relative flex h-6 w-6 items-center justify-center rounded-full bg-success-500 text-white shadow-sm"><span class="absolute inline-flex h-full w-full rounded-full bg-success-500 opacity-50 animate-pulse-ring"></span><span class="relative">'+ic('bus','h-3.5 w-3.5')+'</span></span>';
  if(st==="next") return '<span class="relative flex h-5 w-5 items-center justify-center rounded-full bg-warning-100"><span class="absolute inline-flex h-2.5 w-2.5 rounded-full bg-warning-500 opacity-60 animate-pulse-ring"></span><span class="relative h-2.5 w-2.5 rounded-full bg-warning-500"></span></span>';
  return '<span class="flex h-5 w-5 items-center justify-center rounded-full border-2 border-slate-400 bg-white"></span>';
}
function timelineTag(st,isSel){
  let t="";
  if(st==="current") t+='<span class="rounded-full bg-success-50 px-2 py-0.5 text-[11px] font-semibold text-success-700 ring-1 ring-success-100">Last reached</span>';
  if(st==="next") t+='<span class="rounded-full bg-warning-50 px-2 py-0.5 text-[11px] font-semibold text-warning-700 ring-1 ring-warning-100">Next stop</span>';
  if(isSel) t+='<span class="rounded-full bg-brand-50 px-2 py-0.5 text-[11px] font-semibold text-brand-700 ring-1 ring-brand-100">Your stop</span>';
  return t ? '<span class="flex items-center gap-1.5">'+t+'</span>' : '';
}
function routeTimeline(route,bus){
  const items = buildTimeline(route,bus);
  const selId = state.selectedStops[route.id]||null;
  // Connector is an in-flow flex child (no transform / absolute / z-index) so it
  // paints in the main layer — transformed line layers were going stale on some GPUs.
  return '<ol class="mt-1">'+items.map((it,i)=>{
    const last = i===items.length-1;
    const traveled = it.state==="completed"; // leg to the next stop already covered
    const lineColor = traveled ? '#16a34a' : '#9aa7b8';
    const lineW = traveled ? '3px' : '2px'; // thinner until the leg is covered
    const isSel = it.stop.id===selId;
    const prefix = (it.state==="completed"||it.state==="current") ? "Reached" : "Expected";
    const nameCls = it.state==="upcoming" ? "text-ink-500" : "font-semibold text-ink-900";
    const timeCls = it.state==="current" ? "font-medium text-success-700" : it.state==="next" ? "font-medium text-warning-700" : "text-ink-500";
    return '<li class="flex gap-3.5">'
      + '<div class="flex w-6 shrink-0 flex-col items-center">'
      +   timelineNode(it.state)
      +   (!last ? '<span class="grow rounded-full" style="width:'+lineW+';min-height:20px;background:'+lineColor+'"></span>' : '')
      + '</div>'
      + '<div class="flex min-w-0 flex-1 items-start justify-between gap-3 '+(last?'pb-1':'pb-6')+'"><div class="min-w-0">'
      +   '<div class="flex flex-wrap items-center gap-2"><span class="text-body '+nameCls+'">'+it.stop.name+'</span>'+timelineTag(it.state,isSel)+'</div>'
      +   (it.timeLabel ? '<p class="mt-0.5 text-small '+timeCls+'">'+prefix+' '+it.timeLabel+'</p>' : '<p class="mt-0.5 text-small text-ink-400">Scheduled stop</p>')
      + '</div></div></li>';
  }).join("")+'</ol>';
}
function alertBanner(tone,icon,title,body){
  const map = { warning:"border-warning-100 bg-warning-50 text-warning-700", danger:"border-danger-200 bg-danger-50 text-danger-700" };
  return '<div class="rounded-xl border px-3.5 py-3 '+map[tone]+'"><div class="flex items-start gap-2.5"><span class="mt-0.5 shrink-0">'+ic(icon,'h-4 w-4')+'</span>'
    + '<div><p class="text-small font-semibold">'+title+'</p><p class="mt-0.5 text-small opacity-90">'+body+'</p></div></div></div>';

function liveIndicator(bus,live){
  const last = bus?ms(bus.lastUpdatedMin):null;
  const dot = '<span class="relative flex h-2 w-2">'+(live?'<span class="absolute inline-flex h-full w-full animate-pulse-ring rounded-full bg-success-500 opacity-75"></span>':'')+'<span class="relative inline-flex h-2 w-2 rounded-full '+(live?'bg-success-500':'bg-ink-400')+'"></span></span>';

  return '<div class="flex items-center justify-center gap-2 pt-2 text-small text-ink-500">'+dot+text+'</div>';

function screenTrack(){
  const route = ROUTES.find(r=>r.id===state.trackRouteId);
  const bus = busFor(route.id);
  const status = bus?bus.currentStatus:"offline";
  const delay=bus?bus.delayMinutes:0;

  const notices = noticesForRoute(route.id);
  const busName = bus?bus.name:"Bus";

  // Notices are contextual now: revealed via the bell next to the status badge.
  const noticePanel = (state.showNotices && notices.length)
    ? '<div class="animate-fade-in space-y-3 rounded-2xl border border-warning-100 bg-warning-50/50 p-3">'
      + '<div class="flex items-center justify-between"><h2 class="flex items-center gap-1.5 text-card-title text-ink-900"><span class="text-warning-600">'+ic('bell','h-4 w-4')+'</span>Notices for this bus</h2><button data-action="toggle-notices" class="rounded-full p-1 text-ink-400 hover:bg-warning-100">'+ic('x','h-4 w-4')+'</button></div>'
      + notices.map(noticeCard).join("") + '</div>'
    : "";

  const main = '<div class="space-y-3">'
    + (!state.online?offlineBanner(""):"")
    + (status==="delayed"?alertBanner("warning","clock","Running ~"+delay+" min late", bus.issueMessage||"The driver reported a delay."):"")
    + (status==="cancelled"?alertBanner("danger","circleSlash","This trip is cancelled", bus.issueMessage?"Reason: "+bus.issueMessage+".":"Today's trip has been cancelled."):"")
    + noticePanel
    + fauxMap(route,bus)
    + currentStatusCard(route,bus)
    + '<div class="flex items-start gap-2 rounded-xl bg-surface px-3.5 py-2.5 ring-1 ring-slate-300"><span class="mt-0.5 shrink-0 text-brand-500">'+ic('info','h-4 w-4')+'</span><p class="text-small text-ink-500"><span class="font-semibold text-ink-700">Checkpoint-based.</span> The bus position is taken from the last stop the driver confirmed'+(bus&&bus.lastUpdatedMin!=null?' ('+formatRelativeTime(ms(bus.lastUpdatedMin))+').':'.')+'</p></div>'
    + '<div class="rounded-2xl bg-surface p-4 shadow-card ring-1 ring-slate-300"><h2 class="mb-1 text-section-title text-ink-900">All stops</h2><p class="mb-3 text-small text-ink-500">'+route.stops.length+' stops · '+route.startPoint+' to '+route.endPoint+'</p>'+routeTimeline(route,bus)+'</div>'
    + liveIndicator(bus, state.online&&moving)
    + '</div>';

  const headerAction = '<div class="flex items-center gap-2">'+noticeBell(route.id,true)+statusBadge(status,status==="active")+'</div>';
  return { header: backHeader(busName, route.startPoint+" → "+route.endPoint, headerAction), main, nav:true };
}

//=============================================================================
// Stop-picker bottom sheet
//=============================================================================
function stopSheet(){
  if(!state.sheetOpen) return "";
  const route = ROUTES.find(r=>r.id===state.sheetRouteId);
  const bus = busFor(route.id);
  const cur = bus?bus.lastCheckpointOrder:0;
  const selId = state.selectedStops[route.id]||null;
  const rows = [...route.stops].sort((a,b)=>a.order-b.order).map(s=>{
    const passed = cur>0 && s.order<=cur;
    const isSel = s.id===selId;
    return '<button data-action="pick-stop" data-route="'+route.id+'" data-stop="'+s.id+'" class="flex w-full items-center justify-between gap-3 rounded-xl px-3 py-3 text-left ring-1 transition '+(isSel?'bg-brand-50 ring-brand-200':'bg-surface ring-slate-300 hover:bg-surface-muted')+'">'
      + '<span class="flex items-center gap-3"><span class="flex h-7 w-7 items-center justify-center rounded-full text-[11px] font-bold '+(passed?'bg-success-500 text-white':isSel?'bg-brand-600 text-white':'bg-surface-muted text-ink-500')+'">'+s.order+'</span><span class="text-body font-medium '+(isSel?'text-brand-700':'text-ink-900')+'">'+s.name+'</span></span>'
      + (passed?'<span class="text-small text-success-700">Passed</span>':isSel?'<span class="text-brand-600">'+ic('check','h-4 w-4')+'</span>':'')+'</button>';
  }).join("");
  return '<div class="absolute inset-0 z-40 flex flex-col justify-end">'
    + '<div data-action="close-sheet" class="absolute inset-0 bg-ink-900/40"></div>'
    + '<div class="animate-sheet-up relative rounded-t-3xl bg-surface-page p-4 pb-6 shadow-[0_-8px_40px_rgba(15,23,42,.25)]">'
    +   '<div class="mx-auto mb-3 h-1.5 w-10 rounded-full bg-slate-300"></div>'
    +   '<div class="mb-3 flex items-center justify-between"><h3 class="text-section-title text-ink-900">Select your stop</h3><button data-action="close-sheet" class="rounded-full p-1 text-ink-400 hover:bg-surface-muted">'+ic('x','h-5 w-5')+'</button></div>'
    +   '<p class="mb-3 text-small text-ink-500">'+route.name+' · '+route.startPoint+' → '+route.endPoint+'</p>'
    +   '<div class="no-scrollbar max-h-72 space-y-2 overflow-y-auto">'+rows+'</div>'
    + '</div></div>';
}

//=============================================================================
// Render + events
//=============================================================================
const device = document.getElementById("device");

// ---- URL routing: each screen gets its own #name so the URL reads like a page ----
let suppressHash = false;
function hashFor(){
  switch(state.screen){
    case "home":   return "#home";
    case "routes": return "#buses";
    case "track":  return state.trackRouteId ? "#track/"+state.trackRouteId+(state.showNotices?"/notices":"") : "#track";
    case "login":  return "#login";
    case "signup": return "#signup";
    default:       return ""; // loading / transient — leave URL clean
  }
}
function titleFor(){
  switch(state.screen){
    case "home":   return "Home · BusTrack";
    case "routes": return "All buses · BusTrack";
    case "track":  { const b=busFor(state.trackRouteId); const n=b?b.name:"Track"; return (state.showNotices?"Notices · "+n:n)+" · BusTrack"; }
    case "login":  return "Log in · BusTrack";
    case "signup": return "Sign up · BusTrack";
    default:       return "BusTrack";
  }
}
function parseHash(h){
  h = (h||"").replace(/^#\/?/, "");
  if(!h) return null;
  if(h.indexOf("track/")===0){
    let rest = h.slice(6), notices = false;
    if(rest.indexOf("/notices")>=0){ notices = true; rest = rest.replace("/notices",""); }
    return { screen:"track", routeId:rest, showNotices:notices };
  }
  const map = { home:"home", buses:"routes", login:"login", signup:"signup" };
  return map[h] ? { screen:map[h] } : null;
}
function syncHash(){
  const h = hashFor();
  if(!h) return;
  if(location.hash !== h){ suppressHash = true; location.hash = h; }
  document.title = titleFor();
}
window.addEventListener("hashchange", ()=>{
  if(suppressHash){ suppressHash = false; return; }
  const p = parseHash(location.hash);
  if(p){ state.screen = p.screen; if(p.routeId) state.trackRouteId = p.routeId; state.showNotices = !!p.showNotices; scrollReset(); render(); }
});

function render(){
  let s;
  if(state.screen==="loading") s=screenLoading();
  else if(state.screen==="login") s=screenLogin();
  else if(state.screen==="signup") s=screenSignup();
  else if(state.screen==="routes") s=screenRoutes();
  else if(state.screen==="track") s=screenTrack();
  else s=screenHome();

  if(s.bare){
    device.innerHTML = (s.noStatusBar?"":statusBar())
      + '<div class="flex-1 overflow-y-auto">'+s.main+'</div>';
  } else {
    device.innerHTML = statusBar() + s.header
      + '<main id="main" class="flex-1 overflow-y-auto px-4 pt-4 pb-6">'+s.main+'</main>'
      + (s.nav?bottomNav():"")
      + stopSheet();
  }

  if(state.focusSearch){
    const el = device.querySelector("#search");
    if(el){ el.focus(); const v=el.value; el.value=""; el.value=v; }
    state.focusSearch = false;
  }

  syncHash(); // keep the URL + tab title in sync with the current screen
}

document.body.addEventListener("click",(e)=>{
  const t = e.target.closest("[data-action]");
  if(!t) return;
  const a = t.getAttribute("data-action");
  if(a==="nav"){ const st=t.getAttribute("data-status"); if(st!=null) state.routesStatus=st; state.screen=t.getAttribute("data-nav"); state.showNotices=false; scrollReset(); render(); }
  else if(a==="track"){ state.screen="track"; state.trackRouteId=t.getAttribute("data-route"); state.showNotices=false; scrollReset(); render(); }
  else if(a==="back"){ state.screen="home"; state.showNotices=false; scrollReset(); render(); }
  else if(a==="chip"){ state.routesStatus=t.getAttribute("data-chip"); render(); }
  else if(a==="filter"){ state.noticeFilter=t.getAttribute("data-filter"); render(); }
  else if(a==="toggle-notices"){ state.showNotices=!state.showNotices; render(); }
  else if(a==="toggle-pw"){ const inp=t.parentElement.querySelector("input"); if(inp) inp.type = inp.type==="password"?"text":"password"; }
  else if(a==="go-login"){ state.screen="login"; scrollReset(); render(); }
  else if(a==="go-signup"){ state.screen="signup"; scrollReset(); render(); }
  else if(a==="auth-login"||a==="auth-signup"){ state.screen="home"; scrollReset(); render(); }
  else if(a==="logout"){ state.screen="login"; scrollReset(); render(); }
  else if(a==="clear-search"){ const id=t.getAttribute("data-target"); if(id==="search"){ if(state.screen==="routes") state.routesQuery=""; else state.homeQuery=""; state.focusSearch=true; render(); } }
  else if(a==="open-sheet"){ state.sheetOpen=true; state.sheetRouteId=t.getAttribute("data-route"); render(); }
  else if(a==="close-sheet"){ state.sheetOpen=false; render(); }
  else if(a==="pick-stop"){ state.selectedStops[t.getAttribute("data-route")]=t.getAttribute("data-stop"); state.sheetOpen=false; render(); }
  else if(a==="toggle-online"){ state.online=!state.online; document.getElementById("offlineToggle").textContent = state.online?"Simulate going offline":"Back online"; render(); }
});
document.body.addEventListener("input",(e)=>{
  if(e.target.id==="search"){
    if(state.screen==="routes") state.routesQuery=e.target.value; else state.homeQuery=e.target.value;
    state.focusSearch=true; render();
  }
});
function scrollReset(){ const m=document.getElementById("main"); if(m) m.scrollTop=0; }

// Honor a deep-link hash (e.g. opening/refreshing on #home or #track/route-1);
// otherwise start at the splash and auto-advance to login.
const boot = parseHash(location.hash);
if(boot){ state.screen = boot.screen; if(boot.routeId) state.trackRouteId = boot.routeId; state.showNotices = !!boot.showNotices; }
render();
if(state.screen==="loading"){
  setTimeout(()=>{ if(state.screen==="loading"){ state.screen="login"; render(); } }, 1800);
}
</script>
</body>
</html>
